<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thai Nanny Care</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0E3A66;
  --blue:#1E6FBF;
  --sky:#4FB6E8;
  --sky-light:#DFF3FC;
  --bg:#F2F8FC;
  --card:#FFFFFF;
  --ink:#0F2A44;
  --ink-soft:#54708A;
  --line:#DCEAF4;
  --gold:#F5A623;
  --green:#2FAE66;
  --red:#E0523F;
  --radius:18px;
  --shadow:0 10px 30px -12px rgba(14,58,102,.25);
  --ff-display:'Baloo 2','Noto Sans Thai','Noto Sans SC','Noto Sans JP',sans-serif;
  --ff-body:'Inter','Noto Sans Thai','Noto Sans SC','Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--ff-body);
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,.display{font-family:var(--ff-display);}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}
img{max-width:100%;display:block;}
.hidden{display:none !important;}

/* Layout shells */
#app{min-height:100vh;display:flex;flex-direction:column;}
.container{max-width:1180px;margin:0 auto;padding:0 20px;width:100%;}

/* Top nav */
.topnav{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(120deg,var(--navy),var(--blue) 60%,var(--sky));
  color:#fff;box-shadow:var(--shadow);
}
.topnav-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;max-width:1180px;margin:0 auto;gap:12px;}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--ff-display);font-weight:800;font-size:20px;letter-spacing:.2px;}
.brand-badge{width:38px;height:38px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;padding:4px;flex-shrink:0;}
.brand-badge img{width:100%;height:100%;object-fit:contain;display:block;}
.nav-links{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.nav-links a{padding:8px 12px;border-radius:100px;font-size:14px;font-weight:600;opacity:.9;transition:.15s;}
.nav-links a.active,.nav-links a:hover{background:rgba(255,255,255,.18);opacity:1;}
.nav-right{display:flex;align-items:center;gap:10px;}
.lang-switch{display:flex;gap:2px;background:rgba(255,255,255,.15);padding:3px;border-radius:100px;}
.lang-switch button{border:none;background:transparent;color:#fff;font-size:12px;font-weight:700;padding:5px 9px;border-radius:100px;opacity:.75;}
.lang-switch button.active{background:#fff;color:var(--navy);opacity:1;}
.user-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);padding:5px 10px 5px 5px;border-radius:100px;font-size:13px;font-weight:600;}
.avatar-sm{width:26px;height:26px;border-radius:50%;background:#fff;color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 20px;border-radius:100px;border:none;font-weight:700;font-size:14px;
  transition:.15s;
}
.btn-primary{background:var(--gold);color:#3A2400;}
.btn-primary:hover{filter:brightness(1.06);transform:translateY(-1px);}
.btn-outline{background:transparent;border:1.5px solid rgba(255,255,255,.6);color:#fff;}
.btn-outline:hover{background:rgba(255,255,255,.15);}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:var(--navy);}
.btn-ghost{background:var(--sky-light);color:var(--navy);}
.btn-ghost:hover{background:#cfeaf7;}
.btn-danger{background:#FDEAE7;color:var(--red);}
.btn-danger:hover{background:#fadbd6;}
.btn-sm{padding:7px 14px;font-size:13px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.hamburger{display:none;background:rgba(255,255,255,.15);border:none;color:#fff;width:38px;height:38px;border-radius:10px;font-size:18px;}

main{flex:1;}
footer.site-footer{background:var(--navy);color:#cfe3f4;padding:26px 20px;font-size:13px;text-align:center;margin-top:40px;}

/* Hero blob */
.hero{
  position:relative;overflow:hidden;
  background:radial-gradient(circle at 15% 20%,#eaf6fd,var(--bg) 55%);
  padding:46px 0 30px;
}
.hero-blob{position:absolute;border-radius:50%;filter:blur(2px);opacity:.5;}
.blob1{width:260px;height:260px;background:radial-gradient(circle,var(--sky) 0%,transparent 70%);top:-80px;right:-60px;}
.blob2{width:180px;height:180px;background:radial-gradient(circle,var(--gold) 0%,transparent 70%);bottom:-60px;left:-40px;opacity:.25;}

.hero-inner{display:grid;grid-template-columns:1.05fr 1fr;gap:34px;align-items:center;}
.hero-copy{min-width:0;}
.hero-media{position:relative;padding:0 0 26px 0;}
.hero-photo{width:100%;height:auto;display:block;border-radius:24px;filter:drop-shadow(0 18px 30px rgba(14,58,102,.22));}
.hero-badge{
  position:absolute;display:flex;align-items:center;gap:9px;
  background:#fff;border-radius:14px;box-shadow:var(--shadow);
  padding:9px 14px 9px 10px;z-index:2;
}
.hero-badge .ico{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.hero-badge .num{font-family:var(--ff-display);font-weight:800;font-size:15px;color:var(--navy);line-height:1.1;}
.hero-badge .lbl{font-size:10.5px;font-weight:700;color:var(--ink-soft);line-height:1.1;}
.badge-rating{top:6%;right:0;}
.badge-rating .ico{background:#FEF3DD;color:var(--gold);}
.badge-certified{top:calc(6% + 66px);right:-14px;}
.badge-certified .ico{background:var(--sky-light);color:var(--blue);}
.badge-certified .num,.badge-trained .num{font-size:12.5px;max-width:120px;line-height:1.25;}
.badge-trained{bottom:0;left:0;}
.badge-trained .ico{background:#E7F7EE;color:var(--green);}
.hero-stats{display:flex;flex-wrap:wrap;gap:10px 22px;margin-top:24px;padding-top:20px;border-top:1px dashed var(--line);}
.hero-stat{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--ink-soft);}
.hero-stat .ico{width:28px;height:28px;border-radius:9px;background:var(--sky-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
@media(max-width:900px){
  .hero-inner{grid-template-columns:1fr;}
  .hero-media{order:-1;max-width:360px;margin:0 auto;padding:0 0 22px 0;}
}
@media(max-width:640px){
  .hero-badge{padding:6px 10px 6px 7px;}
  .hero-badge .ico{width:26px;height:26px;font-size:13px;}
  .hero-badge .num{font-size:12.5px;}
  .hero-badge .lbl{font-size:9px;}
}

.page-title{font-size:30px;font-weight:800;color:var(--navy);margin:0 0 6px;}
.page-sub{color:var(--ink-soft);font-size:15px;margin:0 0 26px;max-width:640px;}
.eyebrow{display:inline-flex;align-items:center;gap:6px;background:var(--sky-light);color:var(--blue);font-weight:700;font-size:12px;padding:6px 12px;border-radius:100px;margin-bottom:12px;}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line);}
.pad{padding:22px;}
.grid{display:grid;gap:18px;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:980px){.grid-3{grid-template-columns:repeat(2,1fr);}.grid-4{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}

/* Nanny card */
.nanny-card{padding:18px;display:flex;flex-direction:column;gap:10px;}
.nanny-top{display:flex;gap:12px;align-items:center;}
.avatar{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-weight:800;font-size:20px;color:#fff;flex-shrink:0;}
.nanny-name{font-weight:800;font-size:16px;color:var(--navy);}
.nanny-meta{font-size:12.5px;color:var(--ink-soft);}
.rating{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:var(--gold);}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;}
.tag{background:var(--sky-light);color:var(--blue);font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:100px;}
.price-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px;border-top:1px dashed var(--line);padding-top:10px;}
.price{font-weight:800;color:var(--navy);font-size:16px;}
.price span{font-size:12px;color:var(--ink-soft);font-weight:600;}

.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
.chip{padding:8px 16px;border-radius:100px;background:#fff;border:1.5px solid var(--line);font-weight:700;font-size:13px;color:var(--ink-soft);}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.search-input{padding:11px 16px;border-radius:100px;border:1.5px solid var(--line);flex:1;min-width:180px;font-size:14px;}
.search-input:focus{outline:none;border-color:var(--blue);}

/* forms */
label{font-size:13px;font-weight:700;color:var(--navy);display:block;margin-bottom:6px;}
input[type=text],input[type=email],input[type=password],input[type=number],input[type=date],select,textarea{
  width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--line);font-size:14px;font-family:inherit;background:#fff;color:var(--ink);
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);}
.field{margin-bottom:16px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.two-col{grid-template-columns:1fr;}}

.step-track{display:flex;align-items:center;gap:6px;margin-bottom:26px;flex-wrap:wrap;}
.step{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ink-soft);}
.step-num{width:26px;height:26px;border-radius:50%;background:#e8f1f8;display:flex;align-items:center;justify-content:center;font-size:12px;}
.step.done .step-num{background:var(--green);color:#fff;}
.step.now .step-num{background:var(--blue);color:#fff;}
.step.now{color:var(--navy);}
.step-sep{width:24px;height:2px;background:var(--line);}

.pkg-card{padding:22px;text-align:center;border:2px solid var(--line);cursor:pointer;transition:.15s;}
.pkg-card.selected{border-color:var(--blue);box-shadow:0 0 0 4px var(--sky-light);}
.pkg-card h3{margin:6px 0;color:var(--navy);}
.pkg-price{font-size:26px;font-weight:800;color:var(--blue);margin:8px 0;}
.pkg-price span{font-size:12px;color:var(--ink-soft);}

.summary-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;}
.summary-row:last-child{border:none;font-weight:800;font-size:16px;color:var(--navy);padding-top:14px;}

.pay-methods{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.pay-method{flex:1;min-width:140px;padding:14px;border:1.5px solid var(--line);border-radius:14px;text-align:center;font-weight:700;font-size:13px;cursor:pointer;}
.pay-method.selected{border-color:var(--blue);background:var(--sky-light);color:var(--blue);}

.badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:800;}
.badge-green{background:#E4F8ED;color:var(--green);}
.badge-gold{background:#FDF1DC;color:#B4770B;}
.badge-red{background:#FDEAE7;color:var(--red);}
.badge-blue{background:var(--sky-light);color:var(--blue);}

.equip-card{padding:18px;text-align:left;}
.equip-icon{width:54px;height:54px;border-radius:14px;background:var(--sky-light);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:10px;}
.qty-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
.qty-btn{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--line);background:#fff;font-weight:800;font-size:16px;}

.review-item{padding:16px 0;border-bottom:1px solid var(--line);}
.review-item:last-child{border:none;}
.review-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.stars{color:var(--gold);letter-spacing:2px;}

.mic-circle{
  width:150px;height:150px;border-radius:50%;margin:0 auto 20px;
  background:linear-gradient(140deg,var(--blue),var(--sky));
  display:flex;align-items:center;justify-content:center;font-size:54px;color:#fff;
  box-shadow:0 0 0 10px var(--sky-light);
  cursor:pointer;transition:.2s;
}
.mic-circle.recording{animation:pulse 1.1s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 10px var(--sky-light);}50%{box-shadow:0 0 0 20px var(--sky-light);}100%{box-shadow:0 0 0 10px var(--sky-light);}}
.ai-result{padding:20px;border-radius:16px;background:var(--sky-light);text-align:center;margin-top:20px;}
.ai-result h3{color:var(--navy);margin:6px 0;}
.confidence-bar{height:10px;border-radius:100px;background:#dceefa;overflow:hidden;margin-top:10px;}
.confidence-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--sky));}

/* Admin */
.admin-shell{display:flex;min-height:calc(100vh - 66px);}
.admin-side{width:230px;background:var(--navy);color:#cfe3f4;padding:20px 12px;flex-shrink:0;}
.admin-side h4{color:#8fc2e8;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin:16px 10px 6px;}
.admin-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:14px;font-weight:600;margin-bottom:2px;}
.admin-link.active,.admin-link:hover{background:rgba(255,255,255,.12);color:#fff;}
.admin-main{flex:1;padding:26px;min-width:0;}
.admin-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.stat-card{padding:18px;}
.stat-num{font-size:26px;font-weight:800;color:var(--navy);}
.stat-label{font-size:12.5px;color:var(--ink-soft);font-weight:600;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;color:var(--ink-soft);font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;padding:10px 12px;border-bottom:1.5px solid var(--line);}
td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.table-wrap{overflow-x:auto;}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--line);background:#fff;font-size:13px;}
.modal-bg{position:fixed;inset:0;background:rgba(15,42,68,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal{background:#fff;border-radius:18px;padding:24px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;}
.modal h3{margin-top:0;color:var(--navy);}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:13px 22px;border-radius:100px;font-weight:600;font-size:14px;z-index:300;box-shadow:var(--shadow);}

.login-wrap{min-height:calc(100vh - 66px);display:flex;align-items:center;justify-content:center;padding:30px 16px;background:radial-gradient(circle at 20% 10%,#eaf6fd,var(--bg) 60%);}
.login-card{max-width:400px;width:100%;padding:34px;text-align:center;}
.login-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(140deg,var(--blue),var(--sky));display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px;}
.demo-row{display:flex;gap:8px;margin-top:14px;}
.demo-row button{flex:1;}
.divider{display:flex;align-items:center;gap:10px;color:var(--ink-soft);font-size:12px;margin:18px 0;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line);}

.empty-state{text-align:center;padding:50px 20px;color:var(--ink-soft);}
.empty-state div.icon{font-size:40px;margin-bottom:10px;}

@media(max-width:900px){
  .nav-links{display:none;}
  .nav-right{display:none;}
  .hamburger{display:flex;align-items:center;justify-content:center;}
}
.mobile-menu{
  display:none;flex-direction:column;gap:4px;
  background:var(--navy);padding:10px 14px 16px;
  border-top:1px solid rgba(255,255,255,.12);
}
.mobile-menu.open{display:flex;}
.mobile-menu a{
  padding:12px 10px;border-radius:10px;font-weight:600;font-size:15px;color:#fff;opacity:.92;
}
.mobile-menu a.active,.mobile-menu a:hover{background:rgba(255,255,255,.14);opacity:1;}
.mobile-menu .mm-divider{height:1px;background:rgba(255,255,255,.15);margin:8px 0;}
.mobile-menu .mm-lang{display:flex;gap:8px;padding:4px 10px 8px;}
.mobile-menu .mm-lang button{
  flex:1;padding:9px 0;border-radius:10px;border:1.5px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-weight:700;font-size:13px;
}
.mobile-menu .mm-lang button.active{background:#fff;color:var(--navy);border-color:#fff;}
.mobile-menu .mm-account{padding:6px 10px 0;}
.mobile-menu .mm-user{display:flex;align-items:center;gap:10px;color:#fff;font-weight:700;font-size:14px;padding:8px 0 14px;}

@media(max-width:900px){
  .admin-shell{flex-direction:column;}
  .admin-side{width:100%;display:flex;overflow-x:auto;gap:4px;padding:10px;}
  .admin-side h4{display:none;}
  .admin-link{white-space:nowrap;}
}
@media(max-width:520px){
  .page-title{font-size:24px;}
  .hero .page-title{font-size:28px !important;}
  .container{padding:0 14px;}
  .pad{padding:16px;}
  .topnav-inner{padding:10px 14px;}
  .brand{font-size:17px;}
  .brand-badge{width:32px;height:32px;font-size:16px;}
  .step-track{gap:4px;}
  .step{font-size:11.5px;}
  .step-num{width:22px;height:22px;font-size:11px;}
  .step-sep{width:14px;}
  table{font-size:12px;}
  th,td{padding:8px 6px;}
  .admin-main{padding:16px;}
  .mic-circle{width:120px;height:120px;font-size:44px;}
  .login-card{padding:24px 18px !important;}
  .modal{padding:18px;}
  .pkg-card{padding:16px;}
  .nanny-card{padding:14px;}
}
* { -webkit-tap-highlight-color: transparent; }
html{overflow-x:hidden;}
body{overflow-x:hidden;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-holder"></div>

<script>
/* =========================================================
   THAI NANNY CARE — demo web app (frontend + mock admin backend)
   All data is in-memory mock data for demonstration purposes.
   ========================================================= */

/* ---------------- Translations ---------------- */
const T = {
th:{
  nav_home:"หน้าแรก", nav_nannies:"เลือกพี่เลี้ยง", nav_equipment:"เช่าอุปกรณ์", nav_bookings:"การจองของฉัน", nav_admin:"ระบบหลังบ้าน",
  login:"เข้าสู่ระบบ", logout:"ออกจากระบบ",
  app_name:"Thai Nanny Care", tagline:"ดูแลด้วยหัวใจ ห่วงใยทุกพัฒนาการ",
  hero_title:"หาพี่เลี้ยงเด็กที่ไว้ใจได้ ภายในไม่กี่นาที", hero_sub:"พี่เลี้ยงผ่านการตรวจสอบประวัติ 100% พร้อมระบบจองและชำระเงินที่ปลอดภัย",
  cta_find:"ค้นหาพี่เลี้ยงตอนนี้", cta_rent:"เช่าอุปกรณ์เด็ก",
  hero_badge_rating:"คะแนนรีวิว", hero_badge_certified:"พี่เลี้ยงที่ผ่านการรับรอง", hero_badge_trained:"ผ่านการอบรม",

function computeOrderTotal(){
  let nannyFee=0;
  if(state.selectedNanny && state.selectedPackage){
    const price = state.selectedNanny['price'+state.selectedPackage.charAt(0).toUpperCase()+state.selectedPackage.slice(1)];
    nannyFee = price*state.bookingQty;
  }
  let equipFee=0;
  state.cart.forEach(c=>{ equipFee += c.pricePerDay*c.days*c.qty; });
  const serviceFee = Math.round((nannyFee+equipFee)*0.03);
  return {nannyFee,equipFee,serviceFee,total:nannyFee+equipFee+serviceFee};
}

function renderAIResult(){
  const r = state.aiResult;
  const icons = {hungry:'🍼',sleepy:'😴',uncomfortable:'😣',pain:'🤒'};
  const tips = {hungry:'hungry_tip',sleepy:'sleepy_tip',uncomfortable:'uncomfortable_tip',pain:'pain_tip'};
  return `
  <div class="ai-result">
    <div style="font-size:40px;">${icons[r.type]}</div>

    <div style="font-size:12px;color:var(--ink-soft);margin-top:12px;">${t('ai_confidence')}: ${r.confidence}%</div>
    <div class="confidence-bar"><div class="confidence-fill" style="width:${r.confidence}%;"></div></div>
    <p style="font-size:11px;color:#9db3c4;margin-top:14px;">${t('ai_disclaimer')}</p>
  </div>`;
}
async function startAIRecording(){
  if(state.aiState==='recording'||state.aiState==='analyzing') return;
  state.aiResult=null;
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    state.aiState='recording'; render();
    setTimeout(()=>{
      stream.getTracks().forEach(tr=>tr.stop());
      state.aiState='analyzing'; render();
      setTimeout(()=>{ finishAIResult(); },1400);
    },3000);
  }catch(e){
    showToast(lang==='th'?'ไม่สามารถเข้าถึงไมโครโฟนได้ — ลองใช้ปุ่มจำลองผล':'Microphone unavailable — try simulate instead');
  }
}
function simulateAIResult(){
  state.aiState='analyzing'; render();
  setTimeout(()=>finishAIResult(),1000);
}
function finishAIResult(){
  const types=['hungry','sleepy','uncomfortable','pain'];
  const type = types[Math.floor(Math.random()*types.length)];
  const confidence = 78+Math.floor(Math.random()*19);
  state.aiState='result';
  state.aiResult={type,confidence};
  render();
}

      <tr><th>${t('name')}</th><th>${t('price_hour')}</th><th>${t('price_day')}</th><th>${t('price_month')}</th><th>★</th><th>${t('status')}</th><th>${t('actions')}</th></tr>
      ${DB.nannies.map(n=>`
        <tr>
          <td style="display:flex;align-items:center;gap:8px;">${nannyAvatar(n,32)}${lang==='th'?n.nameTh:n.name}</td>
          <td>${fmtMoney(n.priceHour)}</td><td>${fmtMoney(n.priceDay)}</td><td>${fmtMoney(n.priceMonth)}</td><td>★${n.rating}</td>
          <td><span class="badge ${n.available?'badge-green':'badge-red'}">${n.available?t('available'):t('unavailable')}</span></td>
          <td><button class="icon-btn" onclick="openNannyModal(${n.id})">✎</button> <button class="icon-btn" onclick="deleteNanny(${n.id})">🗑</button></td>
        </tr>`).join('')}
    </table>
  </div>`;
}
function openNannyModal(id){
  const n = id?DB.nannies.find(x=>x.id===id):null;
  const html = `
    <div class="modal-bg" id="modalBg">
      <div class="modal">
        <h3>${n?t('edit'):t('add_new')} — ${t('admin_nannies')}</h3>
        <div class="field"><label>${t('name')}</label><input id="m_name" value="${n?n.name:''}"></div>
        <div class="two-col">
          <div class="field"><label>${t('price_hour')}</label><input id="m_ph" type="number" value="${n?n.priceHour:150}"></div>
          <div class="field"><label>${t('price_day')}</label><input id="m_pd" type="number" value="${n?n.priceDay:1000}"></div>
        </div>
        <div class="field"><label>${t('price_month')}</label><input id="m_pm" type="number" value="${n?n.priceMonth:15000}"></div>
        <div class="field"><label>${t('status')}</label>
          <select id="m_avail"><option value="1" ${n&&n.available?'selected':''}>${t('available')}</option><option value="0" ${n&&!n.available?'selected':''}>${t('unavailable')}</option></select>
        </div>
        <div class="modal-actions">
          <button class="btn btn-outline" style="color:var(--navy);border-color:var(--line);" onclick="closeModal()">${t('cancel')}</button>
          <button class="btn btn-blue" onclick="saveNanny(${id||'null'})">${t('save')}</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-root').innerHTML = html;
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
function saveNanny(id){
  const name = document.getElementById('m_name').value || 'New Nanny';
  const ph = parseInt(document.getElementById('m_ph').value)||0;
  const pd = parseInt(document.getElementById('m_pd').value)||0;
  const pm = parseInt(document.getElementById('m_pm').value)||0;
  const avail = document.getElementById('m_avail').value==='1';
  if(id){
    const n = DB.nannies.find(x=>x.id===id);
    Object.assign(n,{name,nameTh:name,priceHour:ph,priceDay:pd,priceMonth:pm,available:avail});
  }else{
    DB.nannies.push({id:nextId.nanny++,name,nameTh:name,age:30,exp:2,priceHour:ph,priceDay:pd,priceMonth:pm,rating:4.5,reviewCount:0,tags:[],bio_th:'',bio_en:'',available:avail});
  }
  closeModal(); showToast(t('saved_ok')); render();
}
function deleteNanny(id){
  if(!confirm(t('confirm_delete'))) return;
  DB.nannies = DB.nannies.filter(x=>x.id!==id);
  showToast(t('deleted_ok')); render();
}
function adminBookings(){
  return `
  <div class="admin-topbar"><h2 style="color:var(--navy);margin:0;">${t('admin_bookings')}</h2></div>
  <div class="card pad table-wrap">
    <table>
      <tr><th>ID</th><th>${t('customer')}</th><th>${t('nanny_label')}</th><th>${t('package')}</th><th>${t('date')}</th><th>${t('amount')}</th><th>${t('status')}</th><th>${t('actions')}</th></tr>
      ${DB.bookings.slice().reverse().map(b=>{
        const n = DB.nannies.find(x=>x.id===b.nannyId);
        return `<tr>
          <td>#${b.id}</td><td>${b.customer}</td><td>${n?(lang==='th'?n.nameTh:n.name):'-'}</td><td>${t('pkg_'+b.package)}</td><td>${b.start}</td><td>${fmtMoney(b.amount)}</td>
          <td><select onchange="updateBookingStatus(${b.id},this.value)">
            ${['pending','confirmed','completed','cancelled'].map(s=>`<option value="${s}" ${b.status===s?'selected':''}>${t('status_'+s)}</option>`).join('')}
          </select></td>
          <td><button class="icon-btn" onclick="deleteBooking(${b.id})">🗑</button></td>
        </tr>`;
      }).join('')}
    </table>
  </div>`;
}
function updateBookingStatus(id,val){ const b=DB.bookings.find(x=>x.id===id); b.status=val; showToast(t('saved_ok')); }
function deleteBooking(id){ if(!confirm(t('confirm_delete')))return; DB.bookings=DB.bookings.filter(x=>x.id!==id); showToast(t('deleted_ok')); render(); }

function adminEquipment(){
  return `
  <div class="admin-topbar"><h2 style="color:var(--navy);margin:0;">${t('admin_equipment')}</h2><button class="btn btn-blue btn-sm" onclick="openEquipModal()">+ ${t('add_new')}</button></div>
  <div class="card pad table-wrap">
    <table>
      <tr><th>${t('name')}</th><th>${t('per_day_short')}</th><th>Stock</th><th>${t('actions')}</th></tr>
      ${DB.equipment.map(e=>`<tr><td>${e.icon} ${lang==='th'?e.nameTh:e.nameEn}</td><td>${fmtMoney(e.pricePerDay)}</td><td>${e.stock}</td>
      <td><button class="icon-btn" onclick="openEquipModal(${e.id})">✎</button> <button class="icon-btn" onclick="deleteEquip(${e.id})">🗑</button></td></tr>`).join('')}
    </table>
  </div>`;
}
function openEquipModal(id){
  const e = id?DB.equipment.find(x=>x.id===id):null;
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-bg"><div class="modal">
      <h3>${e?t('edit'):t('add_new')} — ${t('admin_equipment')}</h3>
      <div class="field"><label>${t('name')}</label><input id="e_name" value="${e?e.nameEn:''}"></div>
      <div class="two-col">
        <div class="field"><label>${t('per_day_short')}</label><input id="e_price" type="number" value="${e?e.pricePerDay:100}"></div>
        <div class="field"><label>Stock</label><input id="e_stock" type="number" value="${e?e.stock:10}"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" style="color:var(--navy);border-color:var(--line);" onclick="closeModal()">${t('cancel')}</button>
        <button class="btn btn-blue" onclick="saveEquip(${id||'null'})">${t('save')}</button>
      </div>
    </div></div>`;
}
function saveEquip(id){
  const name = document.getElementById('e_name').value || 'New item';
  const price = parseInt(document.getElementById('e_price').value)||0;
  const stock = parseInt(document.getElementById('e_stock').value)||0;
  if(id){ const e=DB.equipment.find(x=>x.id===id); Object.assign(e,{nameEn:name,nameTh:name,pricePerDay:price,stock}); }
  else{ DB.equipment.push({id:nextId.equip++,icon:'🧸',nameTh:name,nameEn:name,pricePerDay:price,stock}); }
  closeModal(); showToast(t('saved_ok')); render();
}
function deleteEquip(id){ if(!confirm(t('confirm_delete')))return; DB.equipment=DB.equipment.filter(x=>x.id!==id); showToast(t('deleted_ok')); render(); }

function adminReviews(){
  return `
  <div class="admin-topbar"><h2 style="color:var(--navy);margin:0;">${t('admin_reviews')}</h2></div>
  <div class="card pad table-wrap">
    <table>
      <tr><th>${t('nanny_label')}</th><th>${t('customer')}</th><th>★</th><th>Comment</th><th>${t('date')}</th><th>${t('actions')}</th></tr>
      ${DB.reviews.slice().reverse().map(r=>{
        const n=DB.nannies.find(x=>x.id===r.nannyId);
        return `<tr><td>${n?(lang==='th'?n.nameTh:n.name):'-'}</td><td>${r.customer}</td><td>${'★'.repeat(r.rating)}</td><td style="max-width:220px;">${lang==='th'?r.comment_th:r.comment_en}</td><td>${r.date}</td>
        <td><button class="icon-btn" onclick="deleteReview(${r.id})">🗑</button></td></tr>`;
      }).join('')}
    </table>
  </div>`;
}
function deleteReview(id){ if(!confirm(t('confirm_delete')))return; DB.reviews=DB.reviews.filter(x=>x.id!==id); showToast(t('deleted_ok')); render(); }

function adminUsers(){
  return `
  <div class="admin-topbar"><h2 style="color:var(--navy);margin:0;">${t('admin_users')}</h2></div>
  <div class="card pad table-wrap">
    <table>
      <tr><th>${t('name')}</th><th>${t('email')}</th><th>Role</th></tr>
      ${DB.users.map(u=>`<tr><td>${u.name}</td><td>${u.email}</td><td><span class="badge badge-blue">${u.role}</span></td></tr>`).join('')}
    </table>
  </div>`;
}

/* ---------------- Router ---------------- */
function renderInto(){
  // lightweight re-render for input fields to avoid focus loss on every keystroke (still full re-render, kept simple for demo)
  render();
}
function render(){
  let route = state.route;
  let body='';
  if(route==='home') body = renderHome();
  else if(route==='nannies') body = renderNannies();
  else if(route==='package') body = renderPackage();
  else if(route==='payment') body = renderPayment();
  else if(route==='paysuccess') body = renderPaySuccess();
  else if(route==='equipment') body = renderEquipment();
  else if(route.startsWith('reviews_')) body = renderReviews(parseInt(route.split('_')[1]));
  else if(route==='ai') body = renderAI();
  else if(route==='mybookings') body = renderMyBookings();
  else if(route==='login') body = renderLogin();
  else if(route==='admin') body = renderAdmin();
  else body = renderHome();

  document.getElementById('app').innerHTML = `
    ${navHTML()}
    <main>${body}</main>
    ${route!=='admin'?footerHTML():''}
    <div id="modal-root"></div>
  `;
}
render();
</script>
</body>
</html>
